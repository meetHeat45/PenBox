<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Live</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000814;
    color: white;
    overflow: hidden;
}

/* SUBSCRIBE */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ff3b3b;
    padding: 8px 14px;
    border-radius: 8px;
}

/* CENTER CONTENT */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 90%;
}

h1 {
    font-size: 2.2rem;
}

.channel {
    color: #9ca3af;
    margin-bottom: 20px;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    line-height: 1.4;
}

/* CHAT (LEFT SIDE STACKED) */
.chat-box {
    position: absolute;
    left: 10px;
    bottom: 120px;
    width: 70%;
}

.chat {
    background: rgba(255,255,255,0.08);
    padding: 6px 10px;
    border-radius: 10px;
    margin-top: 6px;
    font-size: 0.85rem;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1;}
}

/* EMOJIS */
.emoji {
    position: absolute;
    right: 10px;
    font-size: 1.4rem;
    animation: floatEmoji 4s linear forwards;
}

@keyframes floatEmoji {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-300px) translateX(-20px); opacity: 0; }
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 90px;
    width: 100%;
    text-align: center;
    color: #ff4d6d;
    font-weight: bold;
}

/* TIMER */
.timer-box {
    position: absolute;
    bottom: 30px;
    width: 90%;
    left: 5%;
}

.timer-text {
    text-align: center;
    margin-bottom: 5px;
    color: #22c55e;
}

.progress {
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 100%;
    background: #22c55e;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<div class="center">
    <h1>Daily Math Puzzle</h1>
    <div class="channel">PenBox</div>
    <div class="puzzle" id="puzzle"></div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="footer">99% people fail this 😈</div>

<div class="timer-box">
    <div class="timer-text" id="timer">⏳ 60s</div>
    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>
</div>

<script>

// PUZZLES
const puzzles = [
"x² - 5x + 6 = 0",
"x + 1/x = 5",
"x² - 4x - 5 = 0",
"x + 6/x = 5"
];

// USERS + COMMENTS
const users = ["Aman","Riya","Rahul","Priya","Arjun","Sneha","Karan","Aditya"];
const comments = [
"Bhai tough hai 😭","Easy tha 😂","Answer 2?",
"Wait solving...","Aasaan tha","Tricky hai",
"Coffee leke aata hu ☕","Overthinking ho gaya"
];

// EMOJIS
const emojis = ["😂","🔥","😮","😍","😡","👏","😎"];

// PUZZLE
function changePuzzle() {
    const p = puzzles[Math.floor(Math.random()*puzzles.length)];
    document.getElementById("puzzle").innerHTML = p + "<br><br>x = ?";
    startTimer();
}

// TIMER
function startTimer() {
    let time = 60;
    let progress = 100;

    const interval = setInterval(() => {
        document.getElementById("timer").innerText = "⏳ " + time + "s";
        document.getElementById("progress").style.width = progress + "%";

        time--;
        progress -= 1.66;

        if(time < 0){
            clearInterval(interval);
            changePuzzle();
        }
    },1000);
}

// CHAT STACK
function addChat() {
    const box = document.getElementById("chatBox");

    const div = document.createElement("div");
    div.className = "chat";

    const user = users[Math.floor(Math.random()*users.length)];
    const text = comments[Math.floor(Math.random()*comments.length)];

    div.innerText = user + ": " + text;

    box.appendChild(div);

    if(box.children.length > 5){
        box.removeChild(box.children[0]);
    }
}

// EMOJI
function addEmoji(){
    const div = document.createElement("div");
    div.className = "emoji";
    div.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    div.style.bottom = "0px";
    document.body.appendChild(div);

    setTimeout(()=>div.remove(),4000);
}

// INTERVALS
setInterval(addChat, 2000);
setInterval(addEmoji, 700);

// INIT
changePuzzle();

</script>

</body>
</html>
