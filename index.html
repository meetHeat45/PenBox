<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ⏳ Timer Bar Container */
.timer-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
}

/* Time Text */
.timer-text {
    text-align: center;
    font-size: 1rem;
    padding: 6px;
    background: #0f172a;
    letter-spacing: 1px;
}

/* Progress Bar */
.progress-bar {
    height: 6px;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

/* Panic Mode */
.panic {
    background: #ef4444 !important;
    animation: panicPulse 0.5s infinite;
}

@keyframes panicPulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 5px;
    margin-top: 40px;
}

.channel {
    color: #94a3b8;
    margin-bottom: 30px;
    font-size: 1rem;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin: 30px 0;
    text-align: center;
    line-height: 1.6;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

/* 🔥 Ragebait Footer */
.footer {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff4d4d;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 77, 77, 0.9),
                 0 0 20px rgba(255, 77, 77, 0.7);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- ⏳ TIMER -->
<div class="timer-container">
    <div class="timer-text" id="timerText">Time Left: 60s</div>
    <div class="progress-bar" id="progressBar"></div>
</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Only 1% can solve this 😈
</div>

<script>
const puzzles = [
    "x + 1/x = 5 <br><br> x = ?",
    "x - 2/x = 5 <br><br> x = ?",
    "x² - 5x + 6 = 0 <br><br> x = ?",
    "x + 6/x = 5 <br><br> x = ?",
    "x² + 3x - 10 = 0 <br><br> x = ?",
    "x - 4/x = 3 <br><br> x = ?",
    "x + 9/x = 6 <br><br> x = ?",
    "x² - 6x + 8 = 0 <br><br> x = ?",
    "x - 5/x = 4 <br><br> x = ?",
    "x² + 2x - 8 = 0 <br><br> x = ?",
    "x + 4/x = 5 <br><br> x = ?",
    "x² - 3x - 4 = 0 <br><br> x = ?"
];

let index = 0;
let timeLeft = 60;
const totalTime = 60;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];
    index = (index + 1) % puzzles.length;

    resetTimer();
}

function resetTimer() {
    timeLeft = totalTime;
    document.getElementById("progressBar").classList.remove("panic");
}

function updateTimer() {
    timeLeft--;

    document.getElementById("timerText").innerText = "Time Left: " + timeLeft + "s";

    let progress = (timeLeft / totalTime) * 100;
    document.getElementById("progressBar").style.width = progress + "%";

    // 🚨 Panic mode (last 10 sec)
    if (timeLeft <= 10) {
        document.getElementById("progressBar").classList.add("panic");
    }

    if (timeLeft <= 0) {
        changePuzzle();
    }
}

// Init
changePuzzle();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
