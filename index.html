<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ⏳ Timer */
.timer-container {
    width: 100%;
    margin-top: 60px;
}

.timer-text {
    text-align: center;
    font-size: 1rem;
    padding: 6px;
    background: #0f172a;
    letter-spacing: 1px;
}

.progress-bar {
    height: 6px;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

.panic {
    background: #ef4444 !important;
    animation: panicPulse 0.5s infinite;
}

@keyframes panicPulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

h1 {
    font-size: 2.5rem;
    margin: 25px 0 5px 0;
}

.channel {
    color: #94a3b8;
    margin-bottom: 25px;
    font-size: 1rem;
}

.puzzle {
    font-size: 2.5rem;
    font-weight: bold;
    margin: 30px 0;
    text-align: center;
    line-height: 1.6;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

.footer {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff4d4d;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 77, 77, 0.9),
                 0 0 20px rgba(255, 77, 77, 0.7);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="timer-container">
    <div class="timer-text" id="timerText">Time Left: 60s</div>
    <div class="progress-bar" id="progressBar"></div>
</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Only 1% can solve this 😈
</div>

<script>
const puzzles = [

    "Find the next number:<br><br> 2, 6, 7, 21, 22, ?",

    "Brain twist 😈<br><br> If 5 + 3 = 28<br>6 + 2 = 24<br>7 + 4 = ?",

    "Quick logic ⚡<br><br> If 1 = 5<br>2 = 25<br>3 = 325<br>4 = 4325<br>Then 5 = ?",

    "Pattern challenge 🧠<br><br> 3 → 9<br>4 → 16<br>5 → 25<br>6 → ?",

    "Think fast 🤯<br><br> If you multiply me by 2 and add 10, you get 30. What number am I?",

    "Number trick 😈<br><br> 8 × 8 + 8 ÷ 8 = ?",

    "Visual logic 🔥<br><br> 10 = 2<br>25 = 5<br>36 = 6<br>49 = ?",

    "Trap question ⚠️<br><br> If a plane crashes on the border of India and Nepal, where do you bury survivors?",

    "Brain teaser 😏<br><br> I speak without a mouth and hear without ears. What am I?",

    "Speed test ⏳<br><br> 100 ÷ 5 × 2 + 10 = ?",

    "Odd one out 👀<br><br> 64, 27, 16, 125, 36",

    "Smart trick 😈<br><br> A bat and ball cost ₹110 total. Bat costs ₹100 more than ball. Ball costs?",

    "Pattern killer 🔥<br><br> 1, 3, 6, 10, 15, ?",

    "Simple but deadly 😏<br><br> What comes next:<br> J, F, M, A, M, J, ?"
];

let index = 0;
let timeLeft = 60;
const totalTime = 60;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];
    index = (index + 1) % puzzles.length;
    resetTimer();
}

function resetTimer() {
    timeLeft = totalTime;
    document.getElementById("progressBar").classList.remove("panic");
}

function updateTimer() {
    timeLeft--;

    document.getElementById("timerText").innerText = "Time Left: " + timeLeft + "s";

    let progress = (timeLeft / totalTime) * 100;
    document.getElementById("progressBar").style.width = progress + "%";

    if (timeLeft <= 10) {
        document.getElementById("progressBar").classList.add("panic");
    }

    if (timeLeft <= 0) {
        changePuzzle();
    }
}

changePuzzle();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
