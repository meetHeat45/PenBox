<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ⏳ Timer */
.timer-container {
    width: 100%;
    margin-top: 50px;
}

.timer-text {
    text-align: center;
    font-size: 1rem;
    padding: 6px;
    background: #0f172a;
    letter-spacing: 1px;
}

.progress-bar {
    height: 6px;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

.panic {
    background: #ef4444 !important;
    animation: panicPulse 0.5s infinite;
}

@keyframes panicPulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Content */
h1 {
    font-size: 2.3rem;
    margin: 20px 0 5px 0;
}

.channel {
    color: #94a3b8;
    margin-bottom: 20px;
    font-size: 1rem;
}

.puzzle {
    font-size: 2.2rem;
    font-weight: bold;
    margin: 25px 0;
    text-align: center;
    line-height: 1.6;
    padding: 0 10px;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

.footer {
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff4d4d;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 77, 77, 0.9),
                 0 0 20px rgba(255, 77, 77, 0.7);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="timer-container">
    <div class="timer-text" id="timerText">Time Left: 60s</div>
    <div class="progress-bar" id="progressBar"></div>
</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Only 1% can solve this 😈
</div>

<script>
const puzzles = [

"Only 1% can solve 😈<br><br>2 → 6<br>3 → 15<br>4 → 28<br>5 → ?",

"Brain test 🧠<br><br>12 = 3<br>18 = 6<br>20 = 2<br>45 = ?",

"Think fast ⚡<br><br>7 → 343<br>6 → 216<br>5 → 125<br>4 → ?",

"Sequence logic 🔥<br><br>3, 9, 27, 81, ?",

"Trap question 😈<br><br>1 + 3 = 4<br>2 + 5 = 12<br>3 + 7 = 24<br>4 + 9 = ?",

"Quick logic ⚡<br><br>15 → 6<br>27 → 9<br>39 → 12<br>48 → ?",

"Pattern challenge 🧠<br><br>5 → 10<br>6 → 18<br>7 → 28<br>8 → ?",

"Find next 🔍<br><br>10, 21, 43, 87, ?",

"Visual logic 🔥<br><br>9 = 2<br>16 = 3<br>25 = 4<br>36 = ?",

"Math IQ test 😈<br><br>x + 1/x = 6<br>Find x² + 1/x²",

"Alphabet logic 🧠<br><br>A = 1<br>B = 2<br>CAT = 24<br>DOG = ?",

"Easy? Think again 😏<br><br>4 → 16<br>5 → 25<br>6 → 36<br>7 → ?",

"Number pattern 🔥<br><br>2, 6, 7, 21, 22, 66, ?",

"Square trick 😈<br><br>3 → 8<br>4 → 15<br>5 → 24<br>6 → ?",

"Find next prime 🔍<br><br>11, 13, 17, 19, ?",

"Visual trick 👀<br><br>100 = 1<br>121 = 2<br>144 = 3<br>169 = ?",

"Prime twist 🔥<br><br>2 → 3<br>3 → 5<br>5 → 11<br>7 → ?",

"Sequence trap 😈<br><br>8, 6, 7, 5, 3, 0, ?",

"Classic pattern 🧠<br><br>1 → 1<br>2 → 4<br>3 → 9<br>4 → 16<br>5 → ?",

"Final boss 💀<br><br>20 = 2<br>30 = 3<br>40 = 4<br>55 = ?"

];

let index = 0;
let timeLeft = 60;
const totalTime = 60;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];
    index = (index + 1) % puzzles.length;
    resetTimer();
}

function resetTimer() {
    timeLeft = totalTime;
    document.getElementById("progressBar").classList.remove("panic");
}

function updateTimer() {
    timeLeft--;

    document.getElementById("timerText").innerText = "Time Left: " + timeLeft + "s";

    let progress = (timeLeft / totalTime) * 100;
    document.getElementById("progressBar").style.width = progress + "%";

    if (timeLeft <= 10) {
        document.getElementById("progressBar").classList.add("panic");
    }

    if (timeLeft <= 0) {
        changePuzzle();
    }
}

// Auto start
changePuzzle();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
