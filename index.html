<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #020617, #000);
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* TOP */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ef4444;
    padding: 8px 14px;
    border-radius: 8px;
}

/* CENTER */
.center {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 { font-size: 2.5rem; }
.channel { color: #94a3b8; }

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin-top: 20px;
}

/* COMMENTS */
.comment {
    position: absolute;
    left: 10px;
    background: rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    animation: floatChat 6s ease-out forwards;
}

@keyframes floatChat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-120px) translateX(20px); opacity: 0; }
}

/* EMOJIS */
.emoji {
    position: absolute;
    right: 10px;
    font-size: 1.6rem;
    animation: floatEmoji 5s ease-out forwards;
}

@keyframes floatEmoji {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-250px) translateX(-30px) rotate(30deg); opacity: 0; }
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 60px;
    width: 100%;
    text-align: center;
    font-size: 1rem;
    color: #f43f5e;
}

/* TIMER BAR */
.timer-box {
    position: absolute;
    bottom: 20px;
    width: 80%;
    left: 10%;
}

.timer-text {
    text-align: center;
    margin-bottom: 5px;
    color: #22c55e;
}

.progress {
    width: 100%;
    height: 6px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<div class="center">
    <h1>Daily Math Puzzle</h1>
    <div class="channel">PenBox</div>
    <div class="puzzle" id="puzzle"></div>
</div>

<div class="footer">99% people fail this 😈</div>

<div class="timer-box">
    <div class="timer-text" id="timer">⏳ 60s</div>
    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>
</div>

<script>

// PUZZLES
const puzzles = [
"x² - 4x - 5 = 0","x + 1/x = 5","x² - 5x + 6 = 0","x + 6/x = 5",
"x² + 3x - 10 = 0","x - 4/x = 3","x + 9/x = 6","x² - 6x + 8 = 0"
];

// USERS
const users = ["Aman","Riya","Rahul","Priya","Arjun","Sneha","Vikram","Pooja","Rohan","Ankit","Simran","Kabir","Neha","Aditya","Megha","Karan"];

// COMMENTS
const comments = [
"Bhai tough hai 😭","Easy tha 😂","Answer 2?","Wait solving...",
"Overthinking kar diya","Coffee leke aata hu ☕","Aasaan tha","Tricky hai"
];

// EMOJIS
const emojis = ["😂","🔥","😮","😍","😡","👏","💀","😎"];

// PUZZLE
function changePuzzle() {
    const p = puzzles[Math.floor(Math.random()*puzzles.length)];
    document.getElementById("puzzle").innerHTML = p + "<br><br>x = ?";
    startTimer();
}

// TIMER
function startTimer() {
    let time = 60;
    let progress = 100;

    const interval = setInterval(() => {
        document.getElementById("timer").innerText = "⏳ " + time + "s";
        document.getElementById("progress").style.width = progress + "%";

        time--;
        progress -= 1.66;

        if(time < 0){
            clearInterval(interval);
            changePuzzle();
        }
    },1000);
}

// COMMENTS
function generateComment(){
    const div = document.createElement("div");
    div.className = "comment";

    const user = users[Math.floor(Math.random()*users.length)];
    const comment = comments[Math.floor(Math.random()*comments.length)];

    div.innerText = user + ": " + comment;
    div.style.bottom = Math.random()*200 + "px";

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),6000);
}

// EMOJI
function generateEmoji(){
    const div = document.createElement("div");
    div.className = "emoji";
    div.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    div.style.bottom = "0px";
    document.body.appendChild(div);

    setTimeout(()=>div.remove(),5000);
}

// INTERVALS
setInterval(generateComment, 2000);
setInterval(generateEmoji, 700);

// INIT
changePuzzle();

</script>

</body>
</html>
