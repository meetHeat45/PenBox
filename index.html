<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Subscribe Button */
.subscribe {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ef4444;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}
.subscribe:hover {
    background: #dc2626;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 5px;
}

.channel {
    color: #94a3b8;
    margin-bottom: 30px;
    font-size: 1rem;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin: 30px 0;
    text-align: center;
    line-height: 1.6;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

/* 🔥 Highlighted Ragebait Footer */
.footer {
    margin-top: 25px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff4d4d;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 77, 77, 0.9),
                 0 0 20px rgba(255, 77, 77, 0.7);
    animation: pulse 1.5s infinite;
}

/* 🔥 Pulse Animation */
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="subscribe">Subscribe</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Only 1% can solve this 😈
</div>

<script>
const puzzles = [
    "x + 1/x = 5 <br><br> x = ?",
    "x - 2/x = 5 <br><br> x = ?",
    "x² - 5x + 6 = 0 <br><br> x = ?",
    "x + 6/x = 5 <br><br> x = ?",
    "x² + 3x - 10 = 0 <br><br> x = ?",
    "x - 4/x = 3 <br><br> x = ?",
    "x + 9/x = 6 <br><br> x = ?",
    "x² - 6x + 8 = 0 <br><br> x = ?",
    "x - 5/x = 4 <br><br> x = ?",
    "x² + 2x - 8 = 0 <br><br> x = ?",
    "x + 4/x = 5 <br><br> x = ?",
    "x² - 3x - 4 = 0 <br><br> x = ?"
];

let index = 0;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];

    index++;

    if (index >= puzzles.length) {
        index = 0;
    }
}

// Load first puzzle
changePuzzle();

// Auto change every 10 minutes
setInterval(changePuzzle, 600000);
</script>

</body>
</html>
