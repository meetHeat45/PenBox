<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Math Puzzle</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ⏳ Timer */
.timer-container {
    width: 100%;
    margin-top: 50px;
}

.timer-text {
    text-align: center;
    font-size: 1rem;
    padding: 6px;
    background: #0f172a;
    letter-spacing: 1px;
}

.progress-bar {
    height: 6px;
    width: 100%;
    background: #22c55e;
    transition: width 1s linear;
}

.panic {
    background: #ef4444 !important;
    animation: panicPulse 0.5s infinite;
}

@keyframes panicPulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* Content */
h1 {
    font-size: 2.3rem;
    margin: 20px 0 5px 0;
}

.channel {
    color: #94a3b8;
    margin-bottom: 20px;
    font-size: 1rem;
}

.puzzle {
    font-size: 2.2rem;
    font-weight: bold;
    margin: 25px 0;
    text-align: center;
    line-height: 1.6;
    padding: 0 10px;
}

.comment {
    color: #facc15;
    font-size: 1rem;
    margin-top: 10px;
}

.footer {
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #ff4d4d;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 77, 77, 0.9),
                 0 0 20px rgba(255, 77, 77, 0.7);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="timer-container">
    <div class="timer-text" id="timerText">Time Left: 60s</div>
    <div class="progress-bar" id="progressBar"></div>
</div>

<h1>Daily Math Puzzle</h1>
<div class="channel">PenBox</div>

<div class="puzzle" id="puzzle"></div>

<div class="comment">Comment your answer 👇</div>

<div class="footer">
    Only 1% can solve this 😈
</div>

<script>
const puzzles = [

    "Find the next number:<br><br> 5, 11, 23, 47, ?",

    "Pattern challenge 🧠<br><br> 2, 5, 10, 17, 26, ?",

    "Sequence logic 🔥<br><br> 1, 2, 6, 24, 120, ?",

    "Number twist 😈<br><br> 7, 14, 28, 56, ?",

    "Solve fast ⏳<br><br> x² - 7x + 12 = 0<br>Find x",

    "Brain test 🧠<br><br> x² + x - 12 = 0<br>Find x",

    "Quadratic challenge 😈<br><br> 2x² - 8x + 6 = 0<br>Find x",

    "Trap question ⚠️<br><br> A doctor gives you 3 pills and tells you to take one every 30 minutes. How long will they last?",

    "Think carefully 😏<br><br> What has keys but can't open locks?",

    "Logic trap 🔥<br><br> If you drop a red stone in the blue sea, what will it become?",

    "Brain twist 😈<br><br> If 2 + 3 = 13<br>3 + 4 = 25<br>4 + 5 = ?",

    "Quick logic ⚡<br><br> If CAT = 24<br>DOG = 26<br>What is BAT = ?",

    "Visual logic 🔥<br><br> 121 = 11<br>144 = 12<br>169 = ?",

    "Speed test ⏳<br><br> 50 + 50 × 2 = ?",

    "Number trick 😈<br><br> 9 × 9 - 9 ÷ 9 = ?",

    "Brain teaser 😏<br><br> The more you take, the more you leave behind. What am I?",

    "Simple but deadly 😏<br><br> B, E, H, K, ?",

    "Odd one out 👀<br><br> 8, 27, 64, 100, 125",

    "Find the number 🔍<br><br> I am a number. If you square me and add 5, you get 30. What number am I?",

    "Smart math 😈<br><br> A number is increased by 20% and becomes 120. What was the original number?"
];

let index = 0;
let timeLeft = 60;
const totalTime = 60;

function changePuzzle() {
    document.getElementById("puzzle").innerHTML = puzzles[index];
    index = (index + 1) % puzzles.length;
    resetTimer();
}

function resetTimer() {
    timeLeft = totalTime;
    document.getElementById("progressBar").classList.remove("panic");
}

function updateTimer() {
    timeLeft--;

    document.getElementById("timerText").innerText = "Time Left: " + timeLeft + "s";

    let progress = (timeLeft / totalTime) * 100;
    document.getElementById("progressBar").style.width = progress + "%";

    if (timeLeft <= 10) {
        document.getElementById("progressBar").classList.add("panic");
    }

    if (timeLeft <= 0) {
        changePuzzle();
    }
}

// Auto start
changePuzzle();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
