<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Live</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #001d3d, #000814);
    color: white;
    overflow: hidden;
}

/* HEADER */
.header {
    position: absolute;
    top: 10px;
    left: 15px;
    font-size: 0.9rem;
}
.hook { color: #f43f5e; font-weight: bold; }
.watch { color: #22c55e; }
.combo { color: #f97316; }

/* SUBSCRIBE */
.subscribe {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #ff3b3b;
    padding: 8px 14px;
    border-radius: 8px;
}

/* CENTER */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.puzzle {
    font-size: 3rem;
    font-weight: bold;
    margin-top: 20px;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1;}
}

/* CHAT */
.chat-box {
    position: absolute;
    left: 10px;
    bottom: 150px;
    width: 70%;
}
.chat {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(6px);
    padding: 6px 10px;
    border-radius: 10px;
    margin-top: 6px;
    font-size: 0.85rem;
}

/* EMOJI */
.emoji {
    position: absolute;
    right: 10px;
    font-size: 1.4rem;
    animation: floatEmoji 4s linear forwards;
}
@keyframes floatEmoji {
    0% {transform: translateY(0); opacity:0;}
    20% {opacity:1;}
    100% {transform: translateY(-300px) translateX(-20px); opacity:0;}
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
    color: #f43f5e;
    font-weight: bold;
}

/* TIMER */
.timer-box {
    position: absolute;
    bottom: 50px;
    width: 90%;
    left: 5%;
}
.timer-text {
    text-align: center;
    margin-bottom: 8px;
}
.progress {
    height: 10px;
    background: #1e293b;
    border-radius: 20px;
}
.progress-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    border-radius: 20px;
    transition: width 0.5s linear;
}
.danger { color:#ef4444; animation: blink 0.5s infinite; }
@keyframes blink {
    50% {opacity:0.5;}
}

/* ANSWER */
.answer {
    font-size: 2rem;
    color: #4ade80;
    margin-top: 10px;
    text-shadow: 0 0 10px #4ade80;
}
</style>
</head>

<body>

<div class="header">
    <div class="hook">Only 1% can solve this 😈</div>
    <div class="watch" id="watch">👁 1.5K watching</div>
    <div class="combo" id="combo">🔥 Combo: 1</div>
</div>

<div class="subscribe">Subscribe</div>

<div class="center">
    <h2>Daily Math Puzzle</h2>
    <div id="puzzle" class="puzzle"></div>
    <div id="answer" class="answer"></div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="footer">Comment fast 👇</div>

<div class="timer-box">
    <div class="timer-text" id="timer">⏳ 60s</div>
    <div class="progress"><div id="progress" class="progress-bar"></div></div>
</div>

<script>

// PUZZLES + ANSWERS
const puzzles = [
{q:"x² - 5x + 6 = 0", a:"2, 3"},
{q:"x + 1/x = 5", a:"(5±√21)/2"},
{q:"x² - 4x - 5 = 0", a:"5, -1"},
{q:"x + 6/x = 5", a:"2, 3"}
];

// USERS
const users = ["Aman","Riya","Rahul","Priya","Arjun","Sneha","Karan","Aditya","Varun","Neha","Yash","Divya","Ankit","Simran","Kabir"];

// COMMENTS
const comments = [
"Answer 2 lag raha","Almost aa gaya","Bhai tough hai 😭",
"Easy tha 😂","Wait solving...","Galat ho gaya",
"Coffee leke aata hu ☕","Tricky hai","Factorise kar",
"Multiply kar","Close tha yaar"
];

// EMOJIS
const emojis = ["😂","🔥","😮","😍","😡","👏","😎"];

let combo = 1;

function changePuzzle(){
    const p = puzzles[Math.floor(Math.random()*puzzles.length)];
    document.getElementById("puzzle").innerHTML = p.q + "<br><br>x = ?";
    document.getElementById("answer").innerText = "";
    startTimer(p.a);
    combo++;
    document.getElementById("combo").innerText = "🔥 Combo: " + combo;
}

function startTimer(ans){
    let time = 60;
    let progress = 100;

    const interval = setInterval(()=>{
        const t = document.getElementById("timer");
        t.innerText = "⏳ " + time + "s";
        document.getElementById("progress").style.width = progress + "%";

        if(time <= 10) t.classList.add("danger");

        if(time === 3){
            document.getElementById("answer").innerText = "Answer: " + ans;
        }

        time--;
        progress -= (time>20?1:2);

        if(time < 0){
            clearInterval(interval);
            changePuzzle();
        }
    },1000);
}

// VIEWERS
let viewers = 1500;
setInterval(()=>{
    let change = Math.random()<0.2 ? Math.floor(Math.random()*300) : Math.floor(Math.random()*50-20);
    viewers += change;
    if(viewers<1000) viewers=1000;
    document.getElementById("watch").innerText="👁 "+(viewers/1000).toFixed(1)+"K watching";
},2000);

// CHAT
function addChat(){
    const box=document.getElementById("chatBox");
    const div=document.createElement("div");
    div.className="chat";
    div.innerText=users[Math.floor(Math.random()*users.length)] + ": " + comments[Math.floor(Math.random()*comments.length)];
    box.appendChild(div);
    if(box.children.length>6) box.removeChild(box.children[0]);
}

// EMOJI
function addEmoji(){
    const div=document.createElement("div");
    div.className="emoji";
    div.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),4000);
}

// INTERVALS
setInterval(addChat,1500);
setInterval(addEmoji,700);

// INIT
changePuzzle();

</script>

</body>
</html>
